events {
    worker_connections 1024;
}

http {
    upstream api_servers {
        # Round-robin load balancing between instance 1 and instance 2 on host machine
        server host.docker.internal:5064;
        server host.docker.internal:5065;
    }

    server {
        listen 8000;

        # Forward all requests to the upstream API cluster
        location / {
            proxy_pass http://api_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Disable caching for proxy requests
            proxy_cache_bypass $http_upgrade;
        }
    }
}
